<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAMulator</title>
  <link rel="stylesheet" href="css/jamulator.css">
</head>
<body>
  <h1>Jamulator</h1>

  <div class="controller-wrap">
  <div id="controller">

    <!-- ═══ UPPER ZONE: Scene + Matrix ═══ -->

    <div class="left-upper">
      <div class="jam-btn btn-onoff" data-control-id="BtnArrange">Song</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnStep" data-label="Step">Step</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnPadMode" data-label="Pad Mode">Pad Mode</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnClear">Clear</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnDuplicate">Duplicate</div>
      <div class="col-spacer" style="flex: 1; height: auto"></div>
      <div class="dpad">
        <div class="jam-btn" data-control-id="BtnDpad1">&#9650;</div>
        <div class="jam-btn" data-control-id="BtnDpad4">&#9664;</div>
        <div class="jam-btn" data-control-id="BtnDpad2">&#9654;</div>
        <div class="jam-btn" data-control-id="BtnDpad3">&#9660;</div>
      </div>
    </div>

    <div class="center-upper">
      <div class="scene-row">
        <div class="jam-btn btn-rgb" data-control-id="BtnScene1">1</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnScene2">2</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnScene3">3</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnScene4">4</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnScene5">5</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnScene6">6</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnScene7">7</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnScene8">8</div>
      </div>
      <div class="matrix-grid">
        <!-- Row A --><div class="jam-btn btn-rgb" data-control-id="BtnA1"></div><div class="jam-btn btn-rgb" data-control-id="BtnA2"></div><div class="jam-btn btn-rgb" data-control-id="BtnA3"></div><div class="jam-btn btn-rgb" data-control-id="BtnA4"></div><div class="jam-btn btn-rgb" data-control-id="BtnA5"></div><div class="jam-btn btn-rgb" data-control-id="BtnA6"></div><div class="jam-btn btn-rgb" data-control-id="BtnA7"></div><div class="jam-btn btn-rgb" data-control-id="BtnA8"></div>
        <!-- Row B --><div class="jam-btn btn-rgb" data-control-id="BtnB1"></div><div class="jam-btn btn-rgb" data-control-id="BtnB2"></div><div class="jam-btn btn-rgb" data-control-id="BtnB3"></div><div class="jam-btn btn-rgb" data-control-id="BtnB4"></div><div class="jam-btn btn-rgb" data-control-id="BtnB5"></div><div class="jam-btn btn-rgb" data-control-id="BtnB6"></div><div class="jam-btn btn-rgb" data-control-id="BtnB7"></div><div class="jam-btn btn-rgb" data-control-id="BtnB8"></div>
        <!-- Row C --><div class="jam-btn btn-rgb" data-control-id="BtnC1"></div><div class="jam-btn btn-rgb" data-control-id="BtnC2"></div><div class="jam-btn btn-rgb" data-control-id="BtnC3"></div><div class="jam-btn btn-rgb" data-control-id="BtnC4"></div><div class="jam-btn btn-rgb" data-control-id="BtnC5"></div><div class="jam-btn btn-rgb" data-control-id="BtnC6"></div><div class="jam-btn btn-rgb" data-control-id="BtnC7"></div><div class="jam-btn btn-rgb" data-control-id="BtnC8"></div>
        <!-- Row D --><div class="jam-btn btn-rgb" data-control-id="BtnD1"></div><div class="jam-btn btn-rgb" data-control-id="BtnD2"></div><div class="jam-btn btn-rgb" data-control-id="BtnD3"></div><div class="jam-btn btn-rgb" data-control-id="BtnD4"></div><div class="jam-btn btn-rgb" data-control-id="BtnD5"></div><div class="jam-btn btn-rgb" data-control-id="BtnD6"></div><div class="jam-btn btn-rgb" data-control-id="BtnD7"></div><div class="jam-btn btn-rgb" data-control-id="BtnD8"></div>
        <!-- Row E --><div class="jam-btn btn-rgb" data-control-id="BtnE1"></div><div class="jam-btn btn-rgb" data-control-id="BtnE2"></div><div class="jam-btn btn-rgb" data-control-id="BtnE3"></div><div class="jam-btn btn-rgb" data-control-id="BtnE4"></div><div class="jam-btn btn-rgb" data-control-id="BtnE5"></div><div class="jam-btn btn-rgb" data-control-id="BtnE6"></div><div class="jam-btn btn-rgb" data-control-id="BtnE7"></div><div class="jam-btn btn-rgb" data-control-id="BtnE8"></div>
        <!-- Row F --><div class="jam-btn btn-rgb" data-control-id="BtnF1"></div><div class="jam-btn btn-rgb" data-control-id="BtnF2"></div><div class="jam-btn btn-rgb" data-control-id="BtnF3"></div><div class="jam-btn btn-rgb" data-control-id="BtnF4"></div><div class="jam-btn btn-rgb" data-control-id="BtnF5"></div><div class="jam-btn btn-rgb" data-control-id="BtnF6"></div><div class="jam-btn btn-rgb" data-control-id="BtnF7"></div><div class="jam-btn btn-rgb" data-control-id="BtnF8"></div>
        <!-- Row G --><div class="jam-btn btn-rgb" data-control-id="BtnG1"></div><div class="jam-btn btn-rgb" data-control-id="BtnG2"></div><div class="jam-btn btn-rgb" data-control-id="BtnG3"></div><div class="jam-btn btn-rgb" data-control-id="BtnG4"></div><div class="jam-btn btn-rgb" data-control-id="BtnG5"></div><div class="jam-btn btn-rgb" data-control-id="BtnG6"></div><div class="jam-btn btn-rgb" data-control-id="BtnG7"></div><div class="jam-btn btn-rgb" data-control-id="BtnG8"></div>
        <!-- Row H --><div class="jam-btn btn-rgb" data-control-id="BtnH1"></div><div class="jam-btn btn-rgb" data-control-id="BtnH2"></div><div class="jam-btn btn-rgb" data-control-id="BtnH3"></div><div class="jam-btn btn-rgb" data-control-id="BtnH4"></div><div class="jam-btn btn-rgb" data-control-id="BtnH5"></div><div class="jam-btn btn-rgb" data-control-id="BtnH6"></div><div class="jam-btn btn-rgb" data-control-id="BtnH7"></div><div class="jam-btn btn-rgb" data-control-id="BtnH8"></div>
      </div>
    </div>

    <div class="right-upper">
      <div class="fsw-group" hidden>
        <div class="fsw-tab">FSW</div>
        <div class="fsw-indicators">
          <div class="footswitch" data-control-id="FswTip">TIP</div>
          <div class="footswitch" data-control-id="FswRing">RNG</div>
        </div>
      </div>
      <div class="level-meters">
        <div class="level-bar" id="level-l"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div>
        <div class="level-bar" id="level-r"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div>
      </div>
      <div class="right-pair-row">
        <div class="jam-btn btn-onoff btn-half" data-control-id="BtnMst">Mst</div>
        <div class="jam-btn btn-onoff btn-half" data-control-id="BtnGrp">Grp</div>
      </div>
      <div class="right-pair-row">
        <div class="jam-btn btn-onoff btn-half" data-control-id="BtnIn1">In1</div>
        <div class="jam-btn btn-onoff btn-half" data-control-id="BtnCue">Cue</div>
      </div>
      <div class="encoder-space"></div>
      <div class="encoder-wrap">
        <div class="encoder" data-control-id="EncPush"></div>
      </div>
      <div class="encoder-space"></div>
    </div>

    <!-- ═══ TRANSITION ZONE: D-pad / Group ═══ -->

    <div class="left-mid">
      <div class="jam-btn btn-onoff" data-control-id="BtnArpRepeat">Note<br>Repeat</div>
    </div>

    <div class="center-mid">
      <div class="group-row">
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupA">A</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupB">B</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupC">C</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupD">D</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupE">E</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupF">F</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupG">G</div>
        <div class="jam-btn btn-rgb" data-control-id="BtnGroupH">H</div>
      </div>
    </div>

    <div class="right-mid">
      <div class="jam-btn btn-onoff" data-control-id="BtnBrowse">Browse</div>
    </div>

    <!-- ═══ LOWER ZONE: Touch Strips ═══ -->

    <div class="left-lower">
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnMacro" data-label="Macro">Macro</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnLevel" data-label="Level">Level</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnAux" data-label="Aux">Aux</div>
      <div class="col-spacer"></div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnControl" data-label="Control">Control</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnAuto" data-label="Auto">Auto</div>
    </div>

    <div class="center-lower">
      <div class="strips-row">
        <div class="strip-unit" data-control-id="TstA"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
        <div class="strip-unit" data-control-id="TstB"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
        <div class="strip-unit" data-control-id="TstC"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
        <div class="strip-unit" data-control-id="TstD"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
        <div class="strip-unit" data-control-id="TstE"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
        <div class="strip-unit" data-control-id="TstF"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
        <div class="strip-unit" data-control-id="TstG"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
        <div class="strip-unit" data-control-id="TstH"><div class="touch-strip"></div><div class="strip-segments"><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div><div class="seg"></div></div></div>
      </div>
    </div>

    <div class="right-lower">
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnPerform" data-label="Perform">Perform</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnVariation" data-label="Notes">Notes</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnLock" data-label="Lock">Lock</div>
      <div class="col-spacer"></div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnTune" data-label="Tune">Tune</div>
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnSwing" data-label="Swing">Swing</div>
    </div>

    <!-- ═══ Bottom Row ═══ -->
    <div class="bottom-row">
      <div class="jam-btn btn-onoff inverted" data-control-id="BtnShift" data-label="Shift">Shift</div>
      <div class="bottom-spacer"></div>
      <div class="jam-btn btn-onoff" data-control-id="BtnPlay">Play</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnRecord">Rec</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnArrowLeft">&#9664;</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnArrowRight">&#9654;</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnTempo">Tempo</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnGrid">Grid</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnSolo">Solo</div>
      <div class="jam-btn btn-onoff" data-control-id="BtnMute">Mute</div>
      <div class="bottom-spacer"></div>
      <div class="jam-btn btn-onoff" data-control-id="BtnSelect">Select</div>
    </div>
    <div class="resize-handle resize-handle-l"></div>
    <div class="resize-handle resize-handle-r"></div>
  </div>

  </div><!-- .controller-wrap -->

  <!-- ═══ Toolbar ═══ -->
  <div class="conf-group conf-active">
  <div class="conf-tab">CONF</div>
  <div id="toolbar">
    <div class="port-group">
      <label for="midi-actions">From Jam</label>
      <select id="midi-actions">
        <option value="">-- None --</option>
      </select>
    </div>
    <div class="port-group">
      <label for="midi-feedback">From DAW</label>
      <select id="midi-feedback">
        <option value="">-- None --</option>
      </select>
    </div>
    <div class="port-group">
      <label for="midi-output">To DAW</label>
      <select id="midi-output">
        <option value="">-- None --</option>
      </select>
    </div>
    <div class="connect-group">
      <kbd class="hint">space</kbd>
      <button id="btn-connect">Connect</button>
    </div>
    <div class="mapping-picker">
      <button id="btn-mapping" class="mapping-btn">.ncmj</button>
      <div id="mapping-popover" class="mapping-popover" hidden>
        <div id="mapping-current" class="mapping-current"></div>
        <div class="mapping-divider"></div>
        <button id="btn-open-file" class="mapping-action">Open file…</button>
      </div>
    </div>
    <button id="btn-zoom-mode" class="zoom-toggle active" title="Window zoom: resize window to scale">FIT</button>
    <input type="file" id="file-ncmj" accept=".ncmj,.xml">
  </div>
  </div><!-- .conf-group -->


  <script type="module" src="js/main.js"></script>
</body>
</html>
